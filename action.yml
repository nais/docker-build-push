name: "NAIS Docker Build Push"
description: "Build and push docker image to the NAIS registry"
inputs:
  push_image:
    description: "Push image to registry"
    required: true
    default: "true"
  dockerfile:
    description: "Path to the Dockerfile. (default {docker_context}/Dockerfile)"
    required: false
  docker_context:
    description: "Docker build's context is the set of files located in the specified PATH or URL (default Git context)"
    required: true
    default: "."
  tag:
    description: "Custom docker tag"
    required: false
  project_id:
    description: "Google Cloud project ID"
    required: false
  identity_provider:
    description: "Workload Identity Provider"
    required: false
  tenant:
    description: "NAIS tenant"
    required: false
    default: "nav"
  team:
    description: "Team slug"
    required: true
  cache_from:
    description: "Docker buildx cache from"
    required: false
    default: "type=gha"
  cache_to:
    description: "Docker buildx cache to"
    required: false
    default: "type=gha,mode=max"
  image_suffix:
    description: "Adds a suffiks to the generated docker image name"
    required: false
  pull:
    description: "Pull image before building"
    required: false
    default: "true"
  build_args:
    description: "List of build-time variables"
    required: false
  build_secrets:
    description: "List of secrets to expose to the build (e.g., key=string, GIT_AUTH_TOKEN=mytoken)"
    required: false
  outputs:
    description: "List of output destinations (format: type=local,dest=path)"
    required: false
  target:
    description: "Sets the target stage to build"
    required: false
  salsa:
    description: "enable image attestation for SLSA"
    required: false
    default: "true"
  byosbom:
    description: "Bring your own, use existing SBOM for SLSA"
    required: false
    default: "auto-generate-for-me-please.json"
  additional_sboms:
    description: "Newline-separated list of extra CycloneDX SBOM files to merge with the primary SBOM"
    required: false
    default: ""
  platforms:
    description: "List of target platforms for build"
    required: false
outputs:
  salsa:
    description: "SLSA attestation"
    value: ${{ steps.set-outputs.outputs.salsa }}
  digest:
    description: "Image digest"
    value: ${{ steps.set-outputs.outputs.digest }}
  tag:
    description: "Release tag"
    value: ${{ steps.set-outputs.outputs.new_version }}
  image:
    description: "Canonical image reference"
    value: ${{ steps.set-outputs.outputs.image }}
runs:
  using: "composite"
  steps:
    - name: NAIS login
      uses: nais/login@bb6c3e1e14e53d40d69d0d092bd2fce2e39ae3bf # ratchet:nais/login@v0
      id: login
      with:
        project_id: ${{ inputs.project_id }}
        identity_provider: ${{ inputs.identity_provider }}
        team: ${{ inputs.team }}
    - name: Setup environment
      shell: bash
      id: "setup"
      run: |
        if [ ! -d "${{ inputs.docker_context }}" ]; then
          echo "::error ::Docker context not found: ${{ inputs.docker_context }}."
          exit 1
        fi

        dockerfile="${{ inputs.docker_context }}/Dockerfile"
        if [ -n "${{ inputs.dockerfile }}" ]; then
          dockerfile="${{ inputs.dockerfile }}"
        fi

        if [ ! -f "$dockerfile" ]; then
        echo "::error ::Dockerfile not found: $dockerfile. Do you need to prepend context or working directory?"
          exit 1
        fi

        echo "DOCKERFILE=$dockerfile" >> $GITHUB_OUTPUT

        suffix="${{ inputs.image_suffix }}"
        suffix=${suffix:+-$suffix} # Ensure we only add a dash if suffix is set
        repo_name="${GITHUB_REPOSITORY/$GITHUB_REPOSITORY_OWNER\//}$suffix"
        repo_name="$(tr '[:upper:]' '[:lower:]' <<< "$repo_name")"
        echo "REPO_NAME=$repo_name" >> $GITHUB_OUTPUT
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # ratchet:docker/metadata-action@v6
      with:
        images: |
          ${{ steps.login.outputs.registry }}/${{ steps.setup.outputs.REPO_NAME }}
        tags: |
          type=sha,prefix={{date 'YYYY.MM.DD-HH.mm'}}-,priority=9002
          type=raw,enable=${{ inputs.tag != '' }},value=${{ inputs.tag }},priority=9001
    - name: Build and push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7
      id: build_push
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ steps.setup.outputs.DOCKERFILE }}
        push: ${{ inputs.push_image }}
        pull: ${{ inputs.pull }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: ${{ inputs.cache_from }}
        cache-to: ${{ inputs.cache_to }}
        build-args: ${{ inputs.build_args }}
        secrets: ${{ inputs.build_secrets }}
        platforms: ${{ inputs.platforms }}
        target: ${{ inputs.target }}
        outputs: ${{ inputs.outputs }}
    - name: Check for errors
      if: ${{ failure() && steps.build_push.outcome == 'failure' }}
      shell: bash
      run: |
        echo "::error ::Failed during image build. Is your docker_context set to where your build files are?"
        exit 1
    - name: Build canonical image ref
      shell: bash
      id: image-ref
      env:
        IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        IMAGE_DIGEST: ${{ steps.build_push.outputs.digest }}
        PUSH_IMAGE: ${{ inputs.push_image }}
        SALSA: ${{ inputs.salsa }}
      run: |
        set -euo pipefail

        image="${IMAGE_TAGS%%$'\n'*}"
        digest="${IMAGE_DIGEST#@}"

        if [ -z "$image" ]; then
          echo "::error ::Failed to resolve image tag from docker metadata output. Expected steps.meta.outputs.tags to contain at least one image tag."
          exit 1
        fi

        if [[ "$image" == *"@"* ]] && [ -n "$digest" ]; then
          echo "::error ::Failed to construct canonical image reference. Expected image tag without digest, but image already contained '@' while a separate digest was also provided."
          exit 1
        fi

        if [ "$PUSH_IMAGE" = 'true' ] && [ "$SALSA" = 'true' ] && [ -z "$digest" ]; then
          echo "::error ::Failed to resolve image digest from docker build output. Digest is required when push_image=true and salsa=true."
          exit 1
        fi

        image_ref="$image"

        if [ -n "$digest" ]; then
          image_ref="$image@$digest"
        fi

        echo "image=$image_ref" >> "$GITHUB_OUTPUT"
    - name: Generate SBOM, attest and sign image
      if: ${{ inputs.push_image == 'true' && inputs.salsa == 'true' }}
      id: attest-sign
      uses: nais/attest-sign@bb00e4baa4e7acd00b6aff2502b2dfed3d4fad40 # ratchet:nais/attest-sign@v2
      with:
        image_ref: ${{ steps.image-ref.outputs.image }}
        sbom: ${{ inputs.byosbom }}
        additional_sboms: ${{ inputs.additional_sboms }}
    # For some reason, nested composite outputs aren't properly evaluated, so we need to set them again.
    - name: Set outputs
      shell: bash
      id: set-outputs
      run: |
        set -euo pipefail

        image="${{ steps.image-ref.outputs.image }}"
        digest="${{ steps.build_push.outputs.digest }}"

        echo "new_version=${{ steps.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
        echo "image=$image" >> "$GITHUB_OUTPUT"
        echo "digest=$digest" >> "$GITHUB_OUTPUT"
        echo "salsa=${{ steps.attest-sign.outputs.sbom }}" >> "$GITHUB_OUTPUT"
